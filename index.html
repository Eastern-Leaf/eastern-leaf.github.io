<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eastern-Leaf的博客</title>
    <link rel="icon" type="image/jpeg" href="resource/images/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 顶栏 -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <!-- 移动端汉堡菜单按钮 -->
                <button class="hamburger-btn" id="hamburgerBtn" title="菜单" aria-label="打开菜单">
                    <span></span><span></span><span></span>
                </button>
                <h1 class="blog-title">Eastern-Leaf的博客</h1>
                <nav class="topbar-nav">
                    <a href="#" class="nav-link active" data-nav="home">首页</a>
                    <a href="#" class="nav-link" data-nav="about">关于</a>
                </nav>
            </div>
            <div class="topbar-center">
                <div class="search-box" id="searchBox">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索文章...">
                    <button class="search-clear" id="searchClear" title="清除" style="display:none;">✕</button>
                </div>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
                <a href="https://github.com/Eastern-Leaf" target="_blank" rel="noopener" class="github-link" title="GitHub">
                    <span class="github-username" id="githubUsername">Eastern-Leaf</span>
                    <img class="github-avatar" id="githubAvatar" src="" alt="GitHub Avatar">
                </a>
            </div>
        </div>
    </header>

    <!-- 移动端侧栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 左侧栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>文章列表</h2>
            <span class="sidebar-count" id="sidebarCount"></span>
        </div>
        <ul class="article-list" id="articleList">
            <!-- JS 动态填充 -->
        </ul>
        <div class="sidebar-footer">
            <p>📂 在 <code>resource/</code> 文件夹中添加 .md 文件</p>
        </div>
    </aside>

    <!-- 侧栏折叠按钮 -->
    <button class="sidebar-toggle" id="sidebarToggle" title="折叠/展开侧栏">◀</button>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">
        <div class="welcome" id="welcome">
            <h2>👋 欢迎来到我的博客</h2>
            <p>请从左侧选择一篇文章阅读。</p>
        </div>
        <article class="article" id="article" style="display:none;">
            <header class="article-header">
                <h2 class="article-title" id="articleTitle"></h2>
                <div class="article-meta" id="articleMeta"></div>
            </header>
            <div class="article-body markdown-body" id="articleBody"></div>
        </article>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
